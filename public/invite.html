<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Join — Reloxy</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --black:#0c0c0d;--white:#f0f0f2;
    --s1:rgba(255,255,255,0.022);--s2:rgba(255,255,255,0.03);
    --line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.1);--line3:rgba(255,255,255,0.18);
    --g1:rgba(217,217,217,0.55);--g2:rgba(217,217,217,0.38);--g3:rgba(217,217,217,0.3);
  }
  html,body{height:100%;background:var(--black);color:var(--white);font-family:"Helvetica Neue",Helvetica,-apple-system,"Segoe UI",Arial,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-0.1px;}
  body{display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh;
    background:radial-gradient(800px 480px at 50% -8%, rgba(255,255,255,0.04), transparent 60%), var(--black);}

  .card{width:100%;max-width:404px;animation:rise .5s cubic-bezier(.16,1,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .brand{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
  .brand-mark{width:34px;height:34px;border-radius:11px;background:#161618;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;}
  .brand-mark svg{width:17px;height:14px;}
  .brand-name{font-size:13px;font-weight:600;color:var(--g1);letter-spacing:0.3px;}

  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--g2);margin-bottom:12px;}
  .studio{font-size:30px;font-weight:700;letter-spacing:-0.8px;line-height:1.1;}
  .sub{font-size:14px;color:var(--g1);margin-top:9px;line-height:1.5;}

  .form{margin-top:34px;display:flex;flex-direction:column;gap:16px;}
  .field{display:flex;flex-direction:column;gap:8px;}
  .label{font-size:10.5px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--g2);}
  .inp{background:var(--s1);border:1px solid var(--line2);border-radius:12px;padding:14px 15px;color:var(--white);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s,background .15s;width:100%;}
  .inp:focus{border-color:rgba(255,255,255,0.3);box-shadow:0 0 0 3px rgba(255,255,255,0.05);background:var(--s2);}
  .inp:hover:not(:focus){border-color:var(--line3);}
  .inp::placeholder{color:var(--g3);}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:12px;border:none;background:var(--white);color:#0c0c0d;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform .12s ease,opacity .15s;}
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  .err{font-size:13px;color:#f08c8c;background:rgba(240,140,140,0.07);border:1px solid rgba(240,140,140,0.18);border-radius:10px;padding:11px 14px;display:none;}

  .foot{margin-top:22px;text-align:center;font-size:12px;color:var(--g3);}

  .success{display:none;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:8px 0;animation:rise .4s cubic-bezier(.16,1,.3,1);}
  .success-icon{width:56px;height:56px;border-radius:50%;background:rgba(110,200,140,0.1);border:1px solid rgba(110,200,140,0.22);display:flex;align-items:center;justify-content:center;color:#86d6a3;}
  .success-title{font-size:21px;font-weight:700;letter-spacing:-0.5px;}
  .success-sub{font-size:14px;color:var(--g1);line-height:1.55;}
  .success-link{display:inline-block;font-size:14px;color:#0c0c0d;font-weight:700;text-decoration:none;padding:13px 26px;background:var(--white);border-radius:12px;margin-top:6px;transition:transform .12s;}
  .success-link:hover{transform:translateY(-1px);}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-mark"><svg viewBox="0 0 713 575" fill="#f0f0f2"><path d="M658.312 0C698.64 0 725.062 46.0411 707.444 85.6157L617.571 287.5H483.439L611.426 575H477.276L349.289 287.5H483.421L552.033 133.376H360.128C263.886 133.376 176.111 193.241 134.15 287.5H0C78.2742 111.671 242.009 0 421.537 0H658.312Z"/></svg></div>
    <div class="brand-name">Reloxy</div>
  </div>

  <div id="form-wrap">
    <div class="eyebrow">You're invited</div>
    <div class="studio" id="studio-name">Loading…</div>
    <div class="sub" id="card-sub">You've been invited to join the team</div>

    <div class="form">
      <div class="err" id="err"></div>
      <div class="field">
        <label class="label">Your name</label>
        <input class="inp" id="name" placeholder="Victoria Ivanova" autocomplete="name">
      </div>
      <div class="field">
        <label class="label">Email</label>
        <input class="inp" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input class="inp" id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <button class="btn" id="join-btn" onclick="joinTeam()">Join team</button>
    </div>

    <div class="foot">By joining you agree to Reloxy's terms of use.</div>
  </div>

  <div class="success" id="success-wrap">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 10 8 14 16 6"/></svg>
    </div>
    <div class="success-title">You're in!</div>
    <div class="success-sub">Your account is ready.<br>Log in with your email and password to get started.</div>
    <a class="success-link" href="/">Go to login →</a>
  </div>
</div>

<script>
const token = location.pathname.split('/invite/')[1];

async function loadInvite() {
  try {
    const r = await fetch(`/api/invite/${token}`);
    if (!r.ok) throw new Error('Invalid or expired invite link');
    const d = await r.json();
    const studio = d.studio_name || d.owner_name;
    document.getElementById('studio-name').textContent = studio;
    document.getElementById('card-sub').textContent = `Join ${studio} on Reloxy and start collaborating.`;
  } catch (e) {
    document.getElementById('studio-name').textContent = 'Invalid link';
    document.getElementById('card-sub').textContent = e.message;
    document.getElementById('join-btn').disabled = true;
  }
}

async function joinTeam() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';

  if (!name) return showErr('Please enter your name');
  if (!email) return showErr('Please enter your email');
  if (password.length < 6) return showErr('Password must be at least 6 characters');

  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.textContent = 'Joining…';

  try {
    const r = await fetch(`/api/invite/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Something went wrong');
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success-wrap').style.display = 'flex';
  } catch (e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'Join team';
  }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}

loadInvite();
</script>
</body>
</html>
