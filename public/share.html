<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Статус проекта — Reloxy</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --acc:#D9D9D9;
  --card:rgba(255,255,255,0.035);
  --brd:rgba(255,255,255,0.07);
  --brd2:rgba(255,255,255,0.12);
  --g1:rgba(217,217,217,0.55);
  --g2:rgba(217,217,217,0.30);
  --g3:rgba(217,217,217,0.14);
}
html,body{min-height:100%;background:var(--bg);color:var(--acc);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;padding:48px 20px 72px;}

/* ── Brand ── */
.brand{display:flex;align-items:center;gap:9px;margin-bottom:48px;align-self:flex-start;max-width:680px;width:100%;}
.brand-icon{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:14px;height:14px;stroke:var(--acc);fill:none;stroke-width:1.6;}
.brand-name{font-size:13px;font-weight:700;color:var(--g1);letter-spacing:0.1px;}

/* ── Page ── */
.page{width:100%;max-width:680px;display:flex;flex-direction:column;gap:1px;}

/* ── Hero ── */
.hero{padding:36px 36px 32px;background:var(--card);border:1px solid var(--brd);border-radius:18px 18px 0 0;}
.hero-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--g2);margin-bottom:14px;}
.hero-title{font-size:32px;font-weight:800;letter-spacing:-0.6px;line-height:1.15;margin-bottom:10px;}
.hero-sub{font-size:13.5px;color:var(--g1);line-height:1.55;max-width:480px;margin-bottom:28px;}

.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
.meta-pill{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--brd2);font-size:12.5px;color:var(--g1);}
.meta-pill svg{width:14px;height:14px;stroke:var(--acc);fill:none;stroke-width:1.8;flex-shrink:0;}
.meta-pill b{color:var(--acc);font-weight:700;}

.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.prog-label{font-size:12px;color:var(--g2);font-weight:600;letter-spacing:0.2px;}
.prog-pct{font-size:28px;font-weight:800;letter-spacing:-0.04em;color:var(--acc);}
.prog-track{height:6px;border-radius:6px;background:rgba(255,255,255,0.06);}
.prog-fill{height:100%;border-radius:6px;background:var(--acc);transition:width .6s ease;}

/* ── Divider ── */
.divider{height:1px;background:var(--brd);}

/* ── Stages ── */
.stages{padding:32px 36px 36px;background:var(--card);border:1px solid var(--brd);border-top:none;border-radius:0 0 18px 18px;}
.stages-head{margin-bottom:28px;}
.stages-head h2{font-size:17px;font-weight:800;letter-spacing:-0.2px;margin-bottom:4px;}
.stages-head p{font-size:12.5px;color:var(--g2);}

.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:20px;position:relative;}
.tl-item:not(:last-child){padding-bottom:0;}

/* rail */
.tl-rail{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;}
.tl-dot{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--brd2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;}
.tl-dot svg{width:15px;height:15px;stroke:var(--g2);fill:none;stroke-width:2;}
.tl-connector{width:1.5px;flex:1;min-height:24px;background:var(--brd);margin:4px 0;}

.tl-item.is-done .tl-dot{background:var(--acc);border-color:var(--acc);}
.tl-item.is-done .tl-dot svg{stroke:#0e0e0e;stroke-width:2.5;}
.tl-item.is-done .tl-connector{background:rgba(217,217,217,0.25);}

.tl-item.is-current .tl-dot{border-color:var(--acc);background:rgba(217,217,217,0.10);}
.tl-item.is-current .tl-dot svg{stroke:var(--acc);}

/* body */
.tl-body{padding:6px 0 28px;flex:1;}
.tl-item:last-child .tl-body{padding-bottom:0;}

.tl-num{font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--g2);margin-bottom:5px;text-transform:uppercase;}
.tl-title{font-size:15px;font-weight:700;letter-spacing:-0.1px;color:var(--acc);line-height:1.3;margin-bottom:5px;}
.tl-item.is-done .tl-title{color:var(--g1);}

.tl-status{font-size:12px;color:var(--g2);}
.tl-item.is-current .tl-status{color:var(--g1);}

.tl-badge{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 11px;border-radius:8px;background:rgba(217,217,217,0.09);border:1px solid rgba(217,217,217,0.18);font-size:10.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--acc);}
.tl-badge svg{width:11px;height:11px;fill:var(--acc);}

/* done line-through */
.tl-item.is-done .tl-title{text-decoration:line-through;text-decoration-color:rgba(217,217,217,0.25);}

/* ── Empty ── */
.empty{padding:56px 36px;background:var(--card);border:1px solid var(--brd);border-top:none;border-radius:0 0 18px 18px;text-align:center;}
.empty-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.empty-icon svg{width:20px;height:20px;stroke:var(--g2);fill:none;stroke-width:1.5;}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--g1);}

/* ── Footer ── */
.footer{margin-top:40px;text-align:center;font-size:12px;color:var(--g2);line-height:1.8;}
.footer a{color:var(--g1);text-decoration:none;border-bottom:1px solid var(--brd2);}

/* ── Error ── */
.error-wrap{width:100%;max-width:420px;margin-top:40px;}
.error-card{padding:36px;background:var(--card);border:1px solid var(--brd);border-radius:18px;text-align:center;}
.error-icon{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.error-icon svg{width:22px;height:22px;stroke:var(--g2);fill:none;stroke-width:1.5;}
.error-title{font-size:18px;font-weight:800;letter-spacing:-0.2px;margin-bottom:8px;}
.error-sub{font-size:13.5px;color:var(--g1);line-height:1.6;}

@media(max-width:540px){
  .hero{padding:28px 22px 26px;border-radius:14px 14px 0 0;}
  .hero-title{font-size:26px;}
  .stages{padding:26px 22px 28px;border-radius:0 0 14px 14px;}
  .empty{padding:40px 22px;border-radius:0 0 14px 14px;}
  .prog-pct{font-size:24px;}
}
</style>
</head>
<body>

<div class="brand" id="brand" style="display:none">
  <div class="brand-icon">
    <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3"/><circle cx="3" cy="3" r="1.5"/><circle cx="13" cy="3" r="1.5"/><circle cx="3" cy="13" r="1.5"/><circle cx="13" cy="13" r="1.5"/></svg>
  </div>
  <span class="brand-name">Reloxy CRM</span>
</div>

<div id="root"></div>

<div class="footer" id="footer" style="display:none">
  Эта страница обновляется автоматически по мере продвижения проекта.<br>
  Работает на <a href="https://reloxy.tech" target="_blank" rel="noopener">Reloxy</a>
</div>

<script>
const token = location.pathname.split('/share/')[1];
const SL = { planned:'Запланирован', in_progress:'В работе', done:'Готово' };

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}); }catch(_){return d;} }

/* SVG icons (inline, no font dependency) */
const ICONS = {
  person: `<svg viewBox="0 0 16 16"><circle cx="8" cy="5" r="2.5"/><path d="M2 13c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>`,
  tag:    `<svg viewBox="0 0 16 16"><path d="M2 2h6l6 6-6 6-6-6z"/><circle cx="6" cy="6" r="1"/></svg>`,
  cal:    `<svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 2v2M11 2v2M2 7h12"/></svg>`,
  check:  `<svg viewBox="0 0 16 16"><polyline points="3 8 6.5 11.5 13 5"/></svg>`,
  clock:  `<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.5"/></svg>`,
  spin:   `<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5" stroke-dasharray="8 6"/></svg>`,
  empty:  `<svg viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M8 8v2M8 12h.01"/></svg>`,
  link:   `<svg viewBox="0 0 16 16"><path d="M7 9a3.5 3.5 0 0 0 5 0l1.5-1.5a3.5 3.5 0 0 0-5-5L7 4"/><path d="M9 7a3.5 3.5 0 0 0-5 0L2.5 8.5a3.5 3.5 0 0 0 5 5L9 12"/></svg>`,
  bolt:   `<path d="M9 2L4 9h5l-2 5 7-8H9z" fill="currentFill"/>`,
};

function dotIcon(s, isDone){
  if(isDone) return ICONS.check;
  if(s==='in_progress') return ICONS.spin;
  return ICONS.clock;
}

async function load(){
  try{
    const r = await fetch(`/api/share/${token}`);
    if(!r.ok) throw new Error();
    const d = await r.json();
    render(d);
    const bn = document.querySelector('.brand-name');
    if (bn && d.studio_name) bn.textContent = d.studio_name;
    document.getElementById('brand').style.display='flex';
    document.getElementById('footer').style.display='block';
    document.title = `${d.title} — ${d.studio_name || 'Reloxy'}`;
  }catch(_){
    document.getElementById('brand').style.display='flex';
    document.getElementById('root').innerHTML = `
      <div class="error-wrap">
        <div class="error-card">
          <div class="error-icon">${ICONS.link}</div>
          <div class="error-title">Ссылка недействительна</div>
          <div class="error-sub">Возможно, она была отозвана или устарела.<br>Уточните актуальную ссылку у студии.</div>
        </div>
      </div>`;
  }
}

function render(d){
  const pct = Math.max(0,Math.min(100,parseInt(d.progress)||0));
  const deadline = d.deadline ? fmtDate(d.deadline) : null;

  const pills = [];
  if(d.client_name) pills.push(`<div class="meta-pill">${ICONS.person}<b>${esc(d.client_name)}</b></div>`);
  if(d.type)        pills.push(`<div class="meta-pill">${ICONS.tag}${esc(d.type)}</div>`);
  if(deadline)      pills.push(`<div class="meta-pill">${ICONS.cal}Срок: <b>${esc(deadline)}</b></div>`);

  const hero = `
    <div class="hero">
      <div class="hero-eyebrow">${esc(d.studio_name||'Студия')} · Статус проекта</div>
      <div class="hero-title">${esc(d.title)}</div>
      <div class="hero-sub">Здесь вы можете следить за ходом работы над вашим проектом в реальном времени.</div>
      ${pills.length?`<div class="meta">${pills.join('')}</div>`:''}
      <div class="prog-head">
        <span class="prog-label">Общий прогресс</span>
        <span class="prog-pct">${pct}<span style="font-size:16px;font-weight:600;opacity:.5">%</span></span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="divider"></div>`;

  let stagesBlock;
  if(d.stages && d.stages.length){
    const currentIdx = d.stages.findIndex(s => s.status !== 'done');
    const items = d.stages.map((s,i) => {
      const done    = s.status === 'done';
      const current = i === currentIdx && !done;
      const cls     = done ? 'is-done' : current ? 'is-current' : '';
      const isLast  = i === d.stages.length - 1;
      const badge   = current
        ? `<div class="tl-badge"><svg viewBox="0 0 12 12" width="11" height="11"><path d="${ICONS.bolt}" fill="currentColor"/></svg>Сейчас здесь</div>`
        : '';
      return `
        <div class="tl-item ${cls}">
          <div class="tl-rail">
            <div class="tl-dot">${dotIcon(s.status, done)}</div>
            ${isLast?'':`<div class="tl-connector"></div>`}
          </div>
          <div class="tl-body">
            <div class="tl-num">Этап ${i+1}</div>
            <div class="tl-title">${esc(s.title)}</div>
            <div class="tl-status">${SL[s.status]||s.status}</div>
            ${badge}
          </div>
        </div>`;
    }).join('');

    stagesBlock = `
      <div class="stages">
        <div class="stages-head">
          <h2>Этапы работы</h2>
          <p>Прогресс по шагам — от брифа до сдачи проекта.</p>
        </div>
        <div class="timeline">${items}</div>
      </div>`;
  } else {
    stagesBlock = `
      <div class="empty">
        <div class="empty-icon">${ICONS.empty}</div>
        <div class="empty-title">Этапы пока не добавлены</div>
        <div class="empty-sub">Студия скоро опубликует план работы.</div>
      </div>`;
  }

  document.getElementById('root').innerHTML = `<div class="page">${hero}${stagesBlock}</div>`;
}

load();
</script>
</body>
</html>
