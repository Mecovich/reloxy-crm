<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloxy Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black:#040404; --s1:#0c0c0e; --s2:#111114; --s3:#18181c; --s4:#222228;
  --line:rgba(255,255,255,0.06); --line2:rgba(255,255,255,0.12); --line3:rgba(255,255,255,0.2);
  --white:#f0f0f0; --g1:#7a7a82; --g2:#4a4a52; --g3:#2e2e36;
  --accent:#fff;
  --sh-sm:0 1px 3px rgba(0,0,0,0.5),0 1px 8px rgba(0,0,0,0.3);
  --sh-md:0 4px 16px rgba(0,0,0,0.6),0 1px 4px rgba(0,0,0,0.4);
  --r:10px; --r-lg:14px;
}
body { font-family:'Inter',-apple-system,sans-serif; background:var(--black); color:var(--white); min-height:100vh; font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased; letter-spacing:-0.1px; }

.topbar { height:56px; border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 44px; gap:16px; background:rgba(4,4,4,0.95); backdrop-filter:blur(16px); position:sticky; top:0; z-index:50; }
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-logo { width:32px; height:32px; display:flex; align-items:center; }
.topbar-logo img { width:28px; height:28px; object-fit:contain; }
.topbar-name { font-size:15px; font-weight:700; letter-spacing:-0.4px; }
.admin-badge { font-size:10px; font-weight:700; background:var(--accent); color:#050505; padding:2px 10px; border-radius:10px; letter-spacing:0.3px; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.topbar-user { font-size:13px; color:var(--g1); }
.btn { font-size:13px; font-weight:600; padding:7px 16px; border-radius:7px; cursor:pointer; border:none; font-family:inherit; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.1px; }
.btn-ghost { background:transparent; color:var(--g1); border:1px solid var(--line2); }
.btn-ghost:hover { color:var(--white); border-color:var(--line3); background:rgba(255,255,255,0.04); }
.btn-danger { background:rgba(248,113,113,0.1); color:#f87171; border:1px solid rgba(248,113,113,0.2); }
.btn-danger:hover { background:rgba(248,113,113,0.18); }
.btn-accent { background:var(--white); color:#050505; font-weight:700; box-shadow:var(--sh-sm); }

.content { padding:48px 52px; max-width:1160px; margin:0 auto; }

.page-header { margin-bottom:40px; }
.page-header h1 { font-size:30px; font-weight:700; letter-spacing:-1px; }
.page-header p  { font-size:13px; color:var(--g1); margin-top:6px; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:40px; }
.stat { padding:28px 26px 24px; background:var(--s1); border:1px solid var(--line); border-radius:var(--r-lg); transition:border-color 0.15s,box-shadow 0.15s; }
.stat:hover { border-color:var(--line2); box-shadow:var(--sh-md); }
.stat-label { font-size:12px; font-weight:500; color:var(--g1); margin-bottom:14px; letter-spacing:-0.1px; }
.stat-value { font-size:34px; font-weight:700; letter-spacing:-1.4px; color:var(--white); font-variant-numeric:tabular-nums; line-height:1; }

.section-header { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:0; }
.section-title { font-size:15px; font-weight:600; letter-spacing:-0.3px; color:var(--white); }
.section-count { font-size:12px; color:var(--g2); }

table { width:100%; border-collapse:collapse; margin-top:0; }
th { text-align:left; font-size:11px; font-weight:500; letter-spacing:0; color:var(--g1); padding:14px 0; border-bottom:1px solid var(--line); }
th:not(:first-child) { padding-left:24px; }
td { padding:16px 0; border-bottom:1px solid var(--line); font-size:13.5px; color:var(--g1); vertical-align:middle; transition:color 0.1s; }
td:not(:first-child) { padding-left:24px; }
tr:last-child td { border-bottom:none; }
tr:hover td { color:var(--white); }
tr:hover { background:rgba(255,255,255,0.02); }
.td-main { color:var(--white); font-weight:500; font-size:14px; }
.td-sub  { font-size:12px; color:var(--g2); margin-top:3px; }

.role-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; display:inline-block; letter-spacing:0; }
.role-admin { background:var(--white); color:#050505; }
.role-user  { background:var(--s3); color:var(--g1); border:1px solid var(--line2); }

.plan-select { font-size:12px; font-weight:600; padding:5px 11px; border-radius:7px; background:var(--s3); border:1px solid var(--line2); color:var(--white); font-family:inherit; cursor:pointer; outline:none; transition:border-color 0.15s,background 0.15s; -webkit-appearance:none; appearance:none; padding-right:24px; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10' fill='none' stroke='%237a7a82' stroke-width='1.4'><path d='M2 3.5L5 6.5 8 3.5'/></svg>"); background-repeat:no-repeat; background-position:right 8px center; }
.plan-select:hover { border-color:var(--line3); background-color:var(--s4); }
.plan-select.plan-pro    { border-color:rgba(232,200,131,0.35); color:#e8c883; }
.plan-select.plan-studio { border-color:rgba(232,200,131,0.55); color:#f0d79a; box-shadow:0 0 0 1px rgba(232,200,131,0.12); }
.plan-select option { background:#18181c; color:var(--white); }

.actions { display:flex; gap:8px; }
.td-action { font-size:12px; color:var(--g2); cursor:pointer; transition:color 0.1s; padding:3px 6px; border-radius:5px; }
.td-action:hover { color:var(--white); }
.td-action.danger:hover { color:#f87171; }

.empty { padding:70px 0; text-align:center; color:var(--g2); font-size:14px; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--s4); border-radius:3px; }

.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(4px); background:var(--s3); border:1px solid var(--line2); border-radius:var(--r); padding:11px 22px; font-size:13px; font-weight:500; color:var(--white); z-index:999; opacity:0; transition:opacity 0.2s,transform 0.2s; pointer-events:none; box-shadow:var(--sh-md); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">
      <img src="/logo.svg" alt="Reloxy">
    </div>
    <div class="topbar-name">Reloxy</div>
    <div class="admin-badge">ADMIN</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-user" id="admin-name">...</div>
    <button class="btn btn-ghost" onclick="window.location.href='/app'">← Back to CRM</button>
    <button class="btn btn-ghost" onclick="logout()">Sign out</button>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <h1>Admin panel</h1>
    <p>User management and general statistics</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Users</div><div class="stat-value" id="s-users">—</div></div>
    <div class="stat"><div class="stat-label">Clients</div><div class="stat-value" id="s-clients">—</div></div>
    <div class="stat"><div class="stat-label">Projects</div><div class="stat-value" id="s-projects">—</div></div>
    <div class="stat"><div class="stat-label">Total revenue</div><div class="stat-value" id="s-revenue">—</div></div>
  </div>

  <div class="section-header">
    <div class="section-title">Users</div>
    <div class="section-count" id="users-count"></div>
  </div>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Studio</th>
        <th>Role</th>
        <th>Plan</th>
        <th>Clients</th>
        <th>Projects</th>
        <th>Revenue</th>
        <th>Joined</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="users-tbody"></tbody>
  </table>
  <div id="users-empty" class="empty" style="display:none">No users found</div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('crm_token');
let me = null;

async function init() {
  if (!token) return (window.location.href = '/');
  try {
    const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) return (window.location.href = '/');
    me = await res.json();
    if (me.role !== 'admin') {
      alert('Admin access only');
      return (window.location.href = '/app');
    }
    document.getElementById('admin-name').textContent = me.name;
  } catch {
    return (window.location.href = '/');
  }
  await Promise.all([loadStats(), loadUsers()]);
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}

async function loadStats() {
  try {
    const s = await api('GET', '/api/admin/stats');
    document.getElementById('s-users').textContent    = s.totalUsers;
    document.getElementById('s-clients').textContent  = s.totalClients;
    document.getElementById('s-projects').textContent = s.totalProjects;
    document.getElementById('s-revenue').textContent  = fmtRub(s.totalRevenue);
  } catch(e) { console.error(e); }
}

async function loadUsers() {
  try {
    const users = await api('GET', '/api/admin/users');
    document.getElementById('users-count').textContent = users.length + (users.length===1?' user':' users');
    const tbody = document.getElementById('users-tbody');
    const empty = document.getElementById('users-empty');

    if (!users.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display = 'none';

    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div class="td-main">${esc(u.name)}</div>
          <div class="td-sub">${esc(u.email)}</div>
        </td>
        <td>${esc(u.studio_name || '—')}</td>
        <td><span class="role-badge role-${u.role}">${u.role === 'admin' ? 'Admin' : 'User'}</span></td>
        <td>
          <select class="plan-select plan-${u.plan || 'free'}" onchange="setPlan(${u.id}, this.value, '${u.role}')">
            <option value="free"   ${(u.plan||'free')==='free'   ? 'selected' : ''}>Start</option>
            <option value="pro"    ${u.plan==='pro'    ? 'selected' : ''}>Pro</option>
            <option value="studio" ${u.plan==='studio' ? 'selected' : ''}>Studio</option>
          </select>
        </td>
        <td>${u.clients_count}</td>
        <td>${u.projects_count}</td>
        <td style="font-variant-numeric:tabular-nums">${fmtRub(u.revenue)}</td>
        <td style="font-size:11px;color:var(--g3)">${fmtDate(u.created_at)}</td>
        <td>
          <div class="actions">
            ${u.id !== me.id ? `
              <span class="td-action" onclick="toggleRole(${u.id}, '${u.role}')">${u.role === 'admin' ? '↓ User' : '↑ Admin'}</span>
              <span class="td-action danger" onclick="deleteUser(${u.id}, '${esc(u.name)}')">Delete</span>
            ` : '<span style="font-size:11px;color:var(--g3)">You</span>'}
          </div>
        </td>
      </tr>`).join('');
  } catch(e) { console.error(e); }
}

async function setPlan(id, plan, role) {
  const labels = { free:'Start', pro:'Pro', studio:'Studio' };
  try {
    await api('PUT', `/api/admin/users/${id}`, { role, plan });
    toast('Plan → ' + (labels[plan] || plan));
    loadUsers();
  } catch(e) { toast(e.message); loadUsers(); }
}

async function toggleRole(id, currentRole) {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  if (!confirm(`Change role to "${newRole}"?`)) return;
  try {
    await api('PUT', `/api/admin/users/${id}/role`, { role: newRole });
    toast('Role updated');
    loadUsers();
  } catch(e) { toast(e.message); }
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}" and all their data? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/api/admin/users/${id}`);
    toast('User deleted');
    loadStats();
    loadUsers();
  } catch(e) { toast(e.message); }
}

function fmtRub(n) {
  if (!n) return '₽ —';
  if (n >= 1000000) return '₽ ' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return '₽ ' + (n/1000).toFixed(0) + 'K';
  return '₽ ' + Math.round(n);
}

function fmtDate(s) {
  if (!s) return '—';
  return s.slice(0,10);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function logout() {
  localStorage.removeItem('crm_token');
  localStorage.removeItem('crm_user');
  window.location.href = '/';
}

init();
</script>
</body>
</html>
